<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Clip paths -->
  <clipPath id="sq"><rect width="1024" height="1024" rx="229"/></clipPath>
  <clipPath id="disc"><circle cx="512" cy="512" r="337"/></clipPath>

  <!-- Aurora background blobs (opacity fade to transparent, layers over dark base) -->
  <radialGradient id="a1" cx="143" cy="123" r="594" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#1840C8" stop-opacity="0.62"/>
    <stop offset="100%" stop-color="#030A1C" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="a2" cx="881" cy="901" r="533" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#0070A0" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#040A1A" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="a3" cx="881" cy="103" r="246" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#0862C8" stop-opacity="0.45"/>
    <stop offset="100%" stop-color="#030A1C" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="a4" cx="103" cy="881" r="226" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#00A0D0" stop-opacity="0.40"/>
    <stop offset="100%" stop-color="#040A1A" stop-opacity="0"/>
  </radialGradient>

  <!-- Ocean disc gradient (lit from top-left) -->
  <radialGradient id="ocean" cx="464" cy="471" r="355" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#0C2060"/>
    <stop offset="55%"  stop-color="#071440"/>
    <stop offset="100%" stop-color="#040C2C"/>
  </radialGradient>

  <!-- Glow filters -->
  <!-- Land: subtle edge glow -->
  <filter id="lglow" x="-12%" y="-12%" width="124%" height="124%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- City dots: large multi-pass glow -->
  <filter id="dglow" x="-600%" y="-600%" width="1300%" height="1300%">
    <feGaussianBlur stdDeviation="22" result="b1"/>
    <feGaussianBlur stdDeviation="9"  result="b2"/>
    <feMerge>
      <feMergeNode in="b1"/>
      <feMergeNode in="b2"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <!-- Clock hands: soft wide glow -->
  <filter id="hglow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="20" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Rim: glow ring -->
  <filter id="rglow" x="-5%" y="-5%" width="110%" height="110%">
    <feGaussianBlur stdDeviation="14" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<g clip-path="url(#sq)">

  <!-- 1. Dark base -->
  <rect width="1024" height="1024" fill="#030A1C"/>

  <!-- 2. Aurora blobs layered over base -->
  <rect width="1024" height="1024" fill="url(#a1)"/>
  <rect width="1024" height="1024" fill="url(#a2)"/>
  <rect width="1024" height="1024" fill="url(#a3)"/>
  <rect width="1024" height="1024" fill="url(#a4)"/>

  <!-- 3. Ocean disc -->
  <circle cx="512" cy="512" r="337" fill="url(#ocean)"/>

  <!-- 4. Continent fills + teal edge glow -->
  <g clip-path="url(#disc)" filter="url(#lglow)">
    <path d="M 484.2 479.9 L 486.3 462.8 L 494.9 450.0 L 512.0 441.4 L 529.1 435.0 L 544.1 432.9 L 576.2 432.9 L 595.4 447.8 L 604.0 464.9 L 616.8 486.3 L 633.9 486.3 L 625.4 490.6 L 616.8 522.7 L 604.0 552.6 L 591.1 574.0 L 582.6 586.9 L 561.2 586.9 L 552.6 576.2 L 544.1 559.1 L 544.1 522.7 L 539.8 501.3 L 527.0 499.2 L 512.0 501.3 L 505.6 503.4 L 488.5 486.3 L 484.2 479.9 Z" fill="#1AA882" stroke="#5EEAD4" stroke-width="5" stroke-linejoin="round"/>
    <path d="M 505.6 435.0 L 518.4 432.9 L 527.0 432.9 L 548.4 432.9 L 561.2 430.7 L 582.6 426.5 L 599.7 422.2 L 595.4 413.6 L 582.6 405.1 L 569.7 394.4 L 561.2 388.0 L 539.8 388.0 L 535.5 400.8 L 522.7 405.1 L 512.0 409.3 L 518.4 417.9 L 509.9 430.7 L 505.6 435.0 Z" fill="#1AA882" stroke="#5EEAD4" stroke-width="5" stroke-linejoin="round"/>
    <path d="M 512.0 405.1 L 522.7 402.9 L 527.0 400.8 L 524.8 396.5 L 518.4 390.1 L 512.0 388.0 L 509.9 390.1 L 512.0 405.1 Z" fill="#1AA882" stroke="#5EEAD4" stroke-width="5" stroke-linejoin="round"/>
    <path d="M 599.7 422.2 L 651.0 430.7 L 676.7 462.8 L 687.4 494.9 L 693.8 494.9 L 706.6 490.6 L 693.8 473.5 L 676.7 462.8 L 736.6 501.3 L 745.1 509.9 L 758.0 518.4 L 775.1 527.0 L 779.3 522.7 L 768.6 507.7 L 753.7 479.9 L 779.3 469.2 L 800.7 447.8 L 822.1 426.5 L 837.1 409.3 L 826.4 394.4 L 811.4 366.6 L 747.3 353.7 L 693.8 355.9 L 646.7 358.0 L 608.2 366.6 L 597.5 388.0 L 582.6 409.3 L 599.7 422.2 Z" fill="#1AA882" stroke="#5EEAD4" stroke-width="5" stroke-linejoin="round"/>
    <path d="M 255.4 405.1 L 266.0 439.3 L 272.5 443.6 L 293.8 464.9 L 334.5 473.5 L 345.2 490.6 L 358.0 494.9 L 360.1 473.5 L 349.5 458.5 L 351.6 443.6 L 360.1 422.2 L 368.7 415.8 L 381.5 415.8 L 394.4 413.6 L 402.9 409.3 L 385.8 379.4 L 355.9 379.4 L 321.7 362.3 L 276.7 358.0 L 223.3 373.0 L 191.2 358.0 L 163.4 358.0 L 169.8 379.4 L 223.3 388.0 L 244.7 394.4 L 255.4 405.1 Z" fill="#1AA882" stroke="#5EEAD4" stroke-width="5" stroke-linejoin="round"/>
    <path d="M 351.6 486.3 L 358.0 494.9 L 362.3 507.7 L 411.5 503.4 L 415.8 522.7 L 420.0 546.2 L 415.8 565.5 L 402.9 593.3 L 383.7 629.6 L 368.7 618.9 L 368.7 601.8 L 360.1 580.4 L 360.1 550.5 L 360.1 522.7 L 351.6 486.3 Z" fill="#1AA882" stroke="#5EEAD4" stroke-width="5" stroke-linejoin="round"/>
    <path d="M 766.5 580.4 L 783.6 563.3 L 796.5 546.2 L 813.6 541.9 L 826.4 550.5 L 839.2 554.8 L 847.8 571.9 L 852.1 576.2 L 843.5 597.5 L 826.4 597.5 L 813.6 589.0 L 787.9 586.9 L 766.5 580.4 Z" fill="#1AA882" stroke="#5EEAD4" stroke-width="5" stroke-linejoin="round"/>
    <path d="M 402.9 385.8 L 428.6 383.7 L 441.4 373.0 L 467.1 362.3 L 484.2 351.6 L 479.9 336.6 L 441.4 334.5 L 405.1 340.9 L 385.8 349.5 L 373.0 366.6 L 377.3 383.7 L 402.9 385.8 Z" fill="#1AA882" stroke="#5EEAD4" stroke-width="5" stroke-linejoin="round"/>
  </g>

  <!-- 5. City glow dots: NY / London / Tokyo -->
  <g clip-path="url(#disc)" filter="url(#dglow)">
    <circle cx="364.4"  cy="424.3"  r="11" fill="#E8FBFF"/>
    <circle cx="522.7" cy="401.9" r="11" fill="#E8FBFF"/>
    <circle cx="821.5" cy="435.6" r="11" fill="#E8FBFF"/>
  </g>

  <!-- 6. Globe rim glow -->
  <circle cx="512" cy="512" r="337" fill="none"
    stroke="#3A70E0" stroke-width="44" stroke-opacity="0.30"
    filter="url(#rglow)"/>
  <circle cx="512" cy="512" r="337" fill="none"
    stroke="#8899CC" stroke-width="7"/>

  <!-- 7. Clock hands (10:10) + pivot -->
  <g clip-path="url(#disc)" filter="url(#hglow)">
    <line x1="512" y1="512" x2="354.0" y2="420.8"
      stroke="#F4F8FF" stroke-width="24" stroke-linecap="round"/>
    <line x1="512" y1="512" x2="716.9" y2="393.7"
      stroke="#F0F8FF" stroke-width="17" stroke-linecap="round"/>
  </g>
  <!-- Pivot drawn outside filter so it stays crisp on top -->
  <circle cx="512" cy="512" r="22" fill="#FFFFFF"/>
  <circle cx="512" cy="512" r="11" fill="#0A3EB8"/>

</g>
</svg>